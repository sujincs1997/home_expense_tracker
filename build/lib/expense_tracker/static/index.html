<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise | Modern Spending Tracker</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header class="glass-nav">
            <div class="logo">
                <i data-lucide="wallet"></i>
                <h1>SpendWise</h1>
            </div>
            <div class="user-profile">
                <span>Household Admin</span>
                <div class="avatar"></div>
            </div>
        </header>

        <section class="dashboard-grid">
            <!-- Summary Cards -->
            <div class="glass-card summary-card total-balance">
                <div class="card-header">
                    <h3>Total Spent</h3>
                    <i data-lucide="trending-up"></i>
                </div>
                <div class="card-body">
                    <h2 id="total-amount">$0.00</h2>
                    <p class="trend positive">+2.4% from last month</p>
                </div>
            </div>

            <div class="glass-card summary-card category-highest">
                <div class="card-header">
                    <h3>Highest Category</h3>
                    <i data-lucide="pie-chart"></i>
                </div>
                <div class="card-body">
                    <h2 id="top-category">N/A</h2>
                    <p id="top-category-amount">$0.00</p>
                </div>
            </div>

            <div class="glass-card summary-card transitions-count">
                <div class="card-header">
                    <h3>Transactions</h3>
                    <i data-lucide="list"></i>
                </div>
                <div class="card-body">
                    <h2 id="transaction-count">0</h2>
                    <p>Total logged entries</p>
                </div>
            </div>

            <!-- Visualization Section -->
            <div class="glass-card chart-container" style="position: relative; height: 400px;">
                <div class="card-header">
                    <h3>Spending Breakdown</h3>
                </div>
                <div style="position: relative; height: 320px; width: 100%;">
                    <canvas id="spendingChart"></canvas>
                </div>
            </div>

            <!-- Action Section -->
            <div class="glass-card action-container">
                <div class="card-header">
                    <h3>Quick Add</h3>
                </div>
                <form id="expense-form" class="expense-form">
                    <div class="input-group">
                        <label>Amount</label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="input-group">
                        <label>Category</label>
                        <select id="category" required>
                            <option value="Groceries">Groceries</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Rent">Rent</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Transport">Transport</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Description</label>
                        <input type="text" id="description" placeholder="Walmart run...">
                    </div>
                    <div class="input-group">
                        <label>Date</label>
                        <input type="date" id="date" max="9999-12-31">
                    </div>
                    <button type="submit" class="btn-primary">
                        <i data-lucide="plus"></i> Add Expense
                    </button>
                </form>
            </div>

            <!-- Recent Transactions Table -->
            <div class="glass-card transactions-table-container">
                <div class="card-header">
                    <h3>Recent Transactions</h3>
                </div>
                <div class="table-wrapper">
                    <table id="expenses-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Description</th>
                                <th class="text-right">Amount</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="expenses-body">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="/static/js/app.js?v=3"></script>
    <script>
        try {
            lucide.createIcons();
        } catch(e) {}
    </script>
</body>
</html>
